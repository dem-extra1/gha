name: Checkout submodules
description: >-
  Initialize the caller repository's git submodules so later steps can read
  their contents (instead of seeing them as "not initialized"). When a token is
  supplied, submodule URLs are rewritten so the clone authenticates; without one,
  submodules clone anonymously (public submodules work; a private one fails
  naturally at checkout). Run this after actions/checkout.
inputs:
  submodules-token:
    description: >-
      Token with read access to private submodules (e.g. the SUBMODULES_TOKEN
      secret). Leave empty for public submodules, which clone anonymously.
    default: ''
runs:
  using: composite
  steps:
    - name: Checkout submodules
      shell: bash
      env:
        SUBMODULES_TOKEN: ${{ inputs.submodules-token }}
      run: |
        set -euo pipefail
        # With a token, rewrite submodule URLs to authenticate the clone.
        # Without one, warn and proceed: public submodules clone anonymously,
        # and a truly private submodule will fail naturally at checkout.
        if [ -z "$SUBMODULES_TOKEN" ]; then
          echo "::warning::SUBMODULES_TOKEN is empty; cloning submodules anonymously (works for public submodules only)."
        else
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
        fi
        git submodule update --init --recursive --depth 1
