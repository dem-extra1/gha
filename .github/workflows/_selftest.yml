name: selftest
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  links:
    permissions:
      contents: read
      issues: write
      pull-requests: read
    uses: ./.github/workflows/check-links.yml
    with:
      create-issue-on-main: false
  chars:
    uses: ./.github/workflows/check-non-standard-chars.yml
  bib:
    permissions:
      contents: read
    uses: ./.github/workflows/check-bibliography-dois.yml
    with:
      no-metadata-check: true
  # check-phi is brand new, so it doesn't exist at the released `@v1` tag the
  # reusable workflow pins yet. Exercise the local composite directly so the
  # selftest covers the actual PR code (and stays green pre-release); consumers
  # use the reusable workflow once `@v1` includes the action.
  phi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for PHI
        uses: ./check-phi
        with:
          # Run every detector (incl. the off-by-default phone/email) so CI
          # exercises them all; this repo's tree is identifier-free.
          detectors: 'ssn,mrn,dob,csv_phi_header,phone,email'
          base-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
  # quarto-publish is brand new, so (like check-phi above) it isn't at the
  # released `@v1` tag the reusable workflow pins yet. Exercise the local
  # composite directly against a throwaway fixture, build-only (no deploy), so
  # the selftest covers the PR code without touching this repo's Pages.
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Create a minimal Quarto fixture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _ci-quarto-site
          printf 'project:\n  type: website\n' > _ci-quarto-site/_quarto.yml
          printf -- '---\ntitle: Selftest\n---\n\nBuild check for the quarto-publish composite.\n' \
            > _ci-quarto-site/index.qmd
      - name: Build the fixture site
        uses: ./quarto-publish
        with:
          path: _ci-quarto-site
