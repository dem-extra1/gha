name: selftest
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  links:
    permissions:
      contents: read
      issues: write
      pull-requests: read
    uses: ./.github/workflows/check-links.yml
    with:
      create-issue-on-main: false
  chars:
    uses: ./.github/workflows/check-non-standard-chars.yml
  bib:
    permissions:
      contents: read
    uses: ./.github/workflows/check-bibliography-dois.yml
    with:
      no-metadata-check: true
  # check-phi is brand new, so it doesn't exist at the released `@v1` tag the
  # reusable workflow pins yet. Exercise the local composite directly so the
  # selftest covers the actual PR code (and stays green pre-release); consumers
  # use the reusable workflow once `@v1` includes the action.
  phi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check for PHI
        uses: ./check-phi
        with:
          # Run every detector (incl. the off-by-default phone/email) so CI
          # exercises them all; this repo's tree is identifier-free apart from
          # the detector unit-test fixtures, which carry synthetic PHI-shaped
          # strings by design and are skipped via paths-ignore below.
          detectors: 'ssn,mrn,dob,csv_phi_header,phone,email'
          paths-ignore: 'check-phi/tests/**'
          base-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
  # The phi job above proves the action runs clean on an identifier-free tree;
  # this job unit-tests the detector functions directly (positive + negative
  # fixtures per detector, incl. the csv_phi_header line-1/suffix edge cases), so
  # a regression in the regexes/heuristics is caught even when this repo's own
  # tree wouldn't trip it.
  phi-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Run the suite under actions/setup-python (pinned SHA, so Dependabot
      # tracks the action), matching the check-phi composite's '3.x' default.
      # Its env isn't externally-managed, so pip needs no --break-system-packages.
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Run check-phi detector unit tests
        shell: bash
        run: |
          set -euo pipefail
          # Pin pytest for reproducible runs (bump deliberately, not implicitly).
          python3 -m pip install --quiet pytest==9.1.1
          python3 -m pytest check-phi/tests/ -q
  # quarto-publish is brand new, so (like check-phi above) it isn't at the
  # released `@v1` tag the reusable workflow pins yet. Exercise the local
  # composite directly against a throwaway fixture, build-only (no deploy), so
  # the selftest covers the PR code without touching this repo's Pages.
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create a minimal Quarto fixture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _ci-quarto-site
          # _quarto.yml declares a different output-dir than the composite is
          # given below, so a green build proves the `output-dir` input is
          # authoritative (forwarded to `quarto render --output-dir`, overriding
          # _quarto.yml) rather than merely matching it.
          printf 'project:\n  type: website\n  output-dir: _from_quarto_yml\n' > _ci-quarto-site/_quarto.yml
          printf -- '---\ntitle: Selftest\n---\n\nBuild check for the quarto-publish composite.\n' \
            > _ci-quarto-site/index.qmd
      - name: Build the fixture site (non-default output-dir overrides _quarto.yml)
        uses: ./quarto-publish
        with:
          path: _ci-quarto-site
          output-dir: docs
  # bump-submodule / sync-shared-fragments open PRs (write side effects), so the
  # selftest can't run them end-to-end. Exercise the shared open-sync-pr
  # composite's no-op path instead: on a clean tree it must report no change and
  # neither push nor open a PR. Like check-phi/quarto-publish above, use the
  # local `./` ref since the action isn't at `@v1` until release.
  sync-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: open-sync-pr no-ops on a clean tree
        id: nochange
        uses: ./open-sync-pr
        with:
          branch: ci-selftest-open-sync-pr
          commit-message: 'selftest: must not be committed'
          token: ${{ github.token }}
      - name: Assert nothing was committed or opened
        shell: bash
        env:
          CHANGED: ${{ steps.nochange.outputs.changed }}
          PR_URL: ${{ steps.nochange.outputs.pr-url }}
        run: |
          set -euo pipefail
          if [ "$CHANGED" != "false" ] || [ -n "$PR_URL" ]; then
            echo "::error::open-sync-pr should no-op on a clean tree (changed=${CHANGED}, pr-url=${PR_URL})."
            exit 1
          fi
          echo "open-sync-pr correctly no-opped on a clean tree."
