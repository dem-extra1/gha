name: Check NEWS.md Changelog (reusable)

on:
  workflow_call:
    inputs:
      changelog:
        description: Path to the changelog file to check.
        type: string
        default: 'NEWS.md'

jobs:
  Check-Changelog:
    name: Check Changelog Action
    runs-on: ubuntu-latest
    steps:
      - uses: UCD-SERG/changelog-check-action@0189fc7eedec3ef3e9648c713908f6f2a6e99057 # v2 (major-only tag; no vX.Y.Z published)
        with:
          changelog: ${{ inputs.changelog }}
