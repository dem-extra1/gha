name: Check for PHI (reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to set up.
        type: string
        default: '3.x'
      detectors:
        description: >-
          Comma-separated detector set, overriding the default
          (ssn, mrn, dob, csv_phi_header). Also available: phone, email.
        type: string
        default: ''
      paths-ignore:
        description: >-
          Comma/newline-separated glob patterns (relative paths) to skip;
          supports `*`, `?`, and recursive `**`.
        type: string
        default: ''
      allowlist-file:
        description: Path (in the caller repo) to a regex allowlist file.
        type: string
        default: ''
      fail:
        description: Fail the workflow when possible PHI is found (else warn only).
        type: boolean
        default: true

jobs:
  check-phi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so PR runs can diff added lines against the base.
          fetch-depth: 0

      - name: Check for PHI
        uses: d-morrison/gha/check-phi@v1
        with:
          python-version: ${{ inputs.python-version }}
          detectors: ${{ inputs.detectors }}
          paths-ignore: ${{ inputs.paths-ignore }}
          allowlist-file: ${{ inputs.allowlist-file }}
          fail: ${{ inputs.fail }}
          # On PRs, scan only lines added relative to the base; otherwise (push)
          # the action scans the whole tracked tree.
          base-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
