# Active caller for this repo's own reusable Claude agent workflow (dogfooding).
# Distinct filename from the reusable .github/workflows/claude.yml it calls.
#  - setup-r: false — this is a GitHub Actions repo, not an R package, so there
#    is no DESCRIPTION for setup-r-dependencies to install.
#  - eager-pr: true — open the draft PR up front (Copilot-style).
#  - review-workflow-file points at this repo's review caller (claude-review.yml),
#    not the reusable file, so the @claude-review dispatch resolves.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Cheap caller-side gate: only invoke the reusable workflow when an @claude
    # mention is actually present, so unrelated comment / review / issue events
    # don't spawn a (skipped) reusable-workflow run. The reusable workflow still
    # enforces the trusted-author gate (OWNER/MEMBER/COLLABORATOR).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write       # dispatch the review workflow via `gh workflow run`
    uses: d-morrison/gha/.github/workflows/claude.yml@v1
    # Pass secrets explicitly (not `secrets: inherit`) for parity with
    # examples/claude.yml; inherit only works for same-owner callers.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}   # optional; empty when unset
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}       # optional; for editing .github/workflows
    with:
      setup-r: false
      eager-pr: true
      review-workflow-file: claude-review.yml
