name: Claude Code Review (reusable)

# Read-only Claude PR review workflow. Runs the upstream
# `code-review@claude-code-plugins` plugin on a PR and posts its findings.
# Ported from the canonical d-morrison versions (serodynamics / qwt / rme).
#
# The caller stub (see examples/claude-code-review.yml) holds the `on:`
# triggers — `pull_request` for automatic review and `workflow_dispatch` so
# claude.yml can re-dispatch a review after an @claude run pushes commits.
# The stub passes the dispatch's pr_number through as the `pr-number` input.
#
# This workflow is intentionally read-only: its tools grant no git push, so it
# never pushes a fix and `cancel-in-progress: true` is safe.

on:
  workflow_call:
    inputs:
      pr-number:
        description: PR number to review (set by claude.yml's workflow_dispatch; empty for pull_request runs).
        type: string
        default: ''
      prompt-addendum:
        description: Repo-specific review guidance appended to the plugin prompt.
        type: string
        default: ''
      checkout-submodules:
        description: >-
          Check out submodules so the reviewer can read their contents instead
          of reporting them as "not initialized". Needed for repos whose
          analyses reference a submodule. Private submodules require the
          SUBMODULES_TOKEN secret; public submodules clone anonymously without it.
        type: boolean
        default: false
      allowed-bots:
        description: >-
          Comma-separated bot actors the reviewer accepts (passed to
          claude-code-action's allowed_bots). The default, github-actions[bot],
          is the actor `gh workflow run` uses when claude.yml re-dispatches a
          review, so those dispatched reviews aren't rejected as "non-human" —
          which is all gha's own setup needs (the job `if:` below already filters
          bot-authored pushes off the automatic pull_request path). Override only
          if you loosen that gate to review bot-authored pushes directly.
        type: string
        default: 'github-actions[bot]'
    secrets:
      # `required: false` so callers don't hard-fail at the call gate on
      # fork `pull_request` events, where secrets are unavailable: GitHub
      # evaluates required secrets before this workflow's job-level `if:`
      # (which already skips fork PRs) can run. With it optional, fork PRs
      # skip cleanly instead of red-X'ing. Same-repo runs still pass it.
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      SUBMODULES_TOKEN:
        required: false

jobs:
  claude-review:
    # Serialize runs per PR. The stash/restore reviewer dance below assumes
    # only one run mutates the reviewer list at a time. `cancel-in-progress:
    # true` is safe because this workflow is read-only (it never pushes, so it
    # can't cancel its own triggered run).
    #
    # A single @claude push can land here twice — the `synchronize` auto-review
    # AND claude.yml's re-dispatched review, both keyed on the same PR number —
    # so the later run supersedes (cancels) the earlier one. That's the intended
    # dedupe: the survivor posts the current review and the collapse/cancel
    # steps fold the other as OUTDATED, leaving one visible review per push.
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || inputs.pr-number }}
      cancel-in-progress: true

    # Dispatched runs review unconditionally (so a review fires on the draft PR
    # claude.yml opens for an issue trigger). Otherwise skip — don't fail —
    # drafts, Dependabot, fork PRs (forks can't read the OAuth token), and
    # bot-triggered `synchronize` events (e.g. @claude pushing a commit), which
    # would otherwise red-X an automatic review of a bot-authored diff.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.actor != 'dependabot[bot]' &&
        github.event.sender.type != 'Bot' &&
        !endsWith(github.actor, '[bot]')
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # A PR that changes the review workflow file itself can't be reviewed by
      # the action: its App-token exchange requires the workflow to match the
      # default branch, so it 401s ("Workflow validation failed … must have
      # identical content to the … default branch") until merged — the action
      # says this is normal and to ignore it. Rather than post a failing check,
      # detect that case and skip the review; it runs normally once merged. The
      # file checked is the CALLER's review workflow, derived from
      # github.workflow_ref (owner/repo/.github/workflows/<file>@ref ->
      # .github/workflows/<file>): in a workflow_call run the github context is
      # the caller's, so workflow_ref is the consumer's stub — the callee
      # (reusable) path is exposed separately as github.job_workflow_ref — hence
      # this matches whatever name the consumer's stub uses, not just the
      # claude-code-review.yml convention. (Ported from qwt — gha #45.)
      - name: Skip self-review when the PR edits this workflow
        id: selfmod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr-number }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          WF_PATH=$(printf '%s' "$WORKFLOW_REF" | sed -E 's#^[^/]+/[^/]+/(\.github/workflows/[^@]+)@.*#\1#')
          files=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename' 2>/dev/null || true)
          if printf '%s\n' "$files" | grep -qxF "$WF_PATH"; then
            echo "self_mod=true" >> "$GITHUB_OUTPUT"
            echo "::notice::PR #$PR_NUMBER edits $WF_PATH — skipping self-review (the action 401s on workflow validation until merged; it runs after merge)."
          else
            echo "self_mod=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.selfmod.outputs.self_mod != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Initialize submodules so the reviewer can read their contents — without
      # this, reviews of files that include or reference a submodule report it
      # as "not initialized". The shared composite action handles the
      # SUBMODULES_TOKEN insteadOf rewrite and the anonymous fallback; see
      # .github/actions/checkout-submodules.
      - name: Checkout submodules
        if: steps.selfmod.outputs.self_mod != 'true' && inputs.checkout-submodules
        uses: d-morrison/gha/.github/actions/checkout-submodules@v1
        with:
          submodules-token: ${{ secrets.SUBMODULES_TOKEN }}

      # Clear the human reviewers before Claude runs so they aren't notified
      # mid-run, then re-add them when Claude finishes so the re-add fires a
      # fresh notification — letting the human see Claude's review before
      # starting their own. Also snapshot the PR head SHA for the post-step.
      - name: Stash and clear reviewers; record starting head SHA
        id: stash
        if: steps.selfmod.outputs.self_mod != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr-number }}
        run: |
          HEAD_SHA=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.head.sha')
          echo "head_before=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          REVIEWERS_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers")
          USERS=$(echo "$REVIEWERS_JSON" | jq -c '[.users[].login]')
          TEAMS=$(echo "$REVIEWERS_JSON" | jq -c '[.teams[].slug]')
          echo "users=$USERS" >> "$GITHUB_OUTPUT"
          echo "teams=$TEAMS" >> "$GITHUB_OUTPUT"
          if [ "$USERS" != "[]" ] || [ "$TEAMS" != "[]" ]; then
            # `|| true` is intentional and asymmetric with the restore step: a
            # failed stash leaves reviewers in place (recoverable); a failed
            # restore would drop them entirely (not recoverable).
            jq -n --argjson users "$USERS" --argjson teams "$TEAMS" \
              '{reviewers: $users, team_reviewers: $teams}' \
              | gh api -X DELETE "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" --input - || true
          fi

      - name: Run Claude Code Review
        id: claude-review
        if: steps.selfmod.outputs.self_mod != 'true'
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1.0.153
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Allowlist the inline-comment tool so line-specific findings can be
          # anchored to the diff. Without an explicit `claude_args`, the action's
          # computed `--allowedTools` covers only Read/Glob/Grep, the
          # comment-update + CI MCP tools, and git Bash — NOT
          # `mcp__github_inline_comment__create_inline_comment`. Lacking the
          # tool, Claude falls back to `gh api`, hits a tool-permission denial,
          # and the inline comments silently never post (this is an
          # allowlist gap, not a GitHub-App permission scope issue — the tool
          # ships with the action; it just has to be enabled). Mirrors
          # anthropics/claude-code-action's own pr-review workflows. Additive:
          # the CLI merges this with the action's base allowlist, so tag mode's
          # tracking-comment tool is preserved. The tool is only initialized in
          # tag mode (pull_request); dispatched/agent-mode runs still fall back
          # to the summary, per the prompt below (claude-code-action #635).
          # ...and keep this a REVIEW-ONLY run. Even with a read-only contents
          # token, tag mode hands the reviewer git add/commit/rm and the action's
          # default prompt tells it to commit+push, so it flails through
          # permission denials and posts a misleading "grant me git permissions"
          # comment. Disallow the git-write tools (disallowed beats the action's
          # generated allow-list) and tell the agent up front not to attempt
          # edits, so it folds any would-be fix into its review instead.
          claude_args: >-
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment"
            --disallowedTools
            "Bash(git add:*),Bash(git commit:*),Bash(git rm:*),Bash(git push:*),Bash(*git-push.sh*)"
            --append-system-prompt
            "This is a review-only run. Report every issue you find as part
            of your review. Do NOT modify, stage, commit, or push files, and
            do NOT attempt to; the git write tools are intentionally
            disallowed. Never describe changes as 'uncommitted' or ask the
            user to grant git/commit permissions; there is nothing for you to
            commit. If you would have fixed something, describe the fix in
            your review instead."
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || inputs.pr-number }}

            **Watch for AI hallucinations.** This diff may be partly
            machine-authored, so scrutinize it for confident-but-fabricated
            content: calls to functions, methods, arguments, packages, or APIs
            that don't exist; references, citations, DOIs, or URLs that are
            invented or don't resolve; file paths, config keys, or constants
            that look plausible but aren't real; and comments or documentation
            that describe behavior the code doesn't actually implement. Verify
            questionable symbols against the codebase and its dependencies rather
            than assuming they exist, and flag anything you can't confirm as a
            possible hallucination.

            **Post line-specific findings as inline review comments** anchored
            to the relevant line(s) — use the inline-comment tool, not a prose
            list in the summary. Reserve the top-level summary comment for a
            brief overall verdict plus any finding not tied to a specific line;
            don't restate each inline comment there.

            If the inline-comment tool isn't available in this environment
            (dispatched reviews run in agent mode without it — see
            claude-code-action #635), or if posting an inline comment fails
            with a permission error (e.g. a 403 "Resource not accessible by
            integration"), don't drop the findings: put every finding in the
            top-level summary comment instead, grouped by file with `path:line`
            anchors. Don't announce a tool that's simply missing in agent mode,
            but when the cause is a permission error, add a one-line footnote at
            the bottom of the summary so the failure is diagnosable:
            `> ℹ️ Inline comments were unavailable (permission error); findings appear above with path:line anchors.`

            **Confirming review (no new findings):** If you find no new issues
            — because no code changed since the last review, or every concern
            is already addressed — do not just say "no issues found." Find the
            most recent prior review comment on this PR (look for a
            `claude[bot]` comment containing a review verdict) and reference it
            explicitly: state the prior verdict, link to that comment by its
            GitHub URL, and explain that it still stands. This lets readers
            know the confirming review ran and why it produced no new findings,
            rather than leaving the PR thread silent.
            ${{ inputs.prompt-addendum }}
          # `track_progress` forces tag mode, which guarantees a tracking
          # comment even when the plugin scores the PR below its post
          # threshold. The action REJECTS `track_progress` for
          # workflow_dispatch, so gate it on event_name: tag mode for
          # pull_request, agent mode (possibly silent) for dispatched runs.
          # Tag mode also initializes the inline-comment tool; agent mode does
          # not (claude-code-action #635), so the prompt above falls back to a
          # summary-only review on dispatched runs.
          track_progress: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          # Fresh tracking comment per run so each push surfaces as new PR
          # activity; the collapse step below folds priors up as OUTDATED.
          use_sticky_comment: 'false'
          display_report: 'true'
          # Permit bot actors to initiate this run (default github-actions[bot],
          # overridable via the allowed-bots input). claude.yml re-dispatches a
          # review after an @claude run pushes commits, and `gh workflow run`
          # there runs as github-actions[bot]. But the action's AGENT mode —
          # which workflow_dispatch uses (track_progress is 'false' above for
          # dispatched runs) — blocks bot actors by default, failing with
          # "Workflow initiated by non-human actor: github-actions". Without
          # this, every re-dispatched review dies before it can post. Scoped to
          # the bot(s) that legitimately dispatch us: the `if:` gate already
          # filters bot actors out of the automatic pull_request path, so this
          # only widens the dispatch path, which is itself reachable only via
          # claude.yml's trusted-author gate (or a manual dispatch, which needs
          # write access).
          allowed_bots: ${{ inputs.allowed-bots }}

      # Guard: fail the check when the Claude run ended with is_error:true.
      # The action exits 0 even in that case (the result object's subtype is
      # "success" but is_error is true), so without this step a silently-failed
      # review looks green. Runs only when claude-review exited 0 (outcome ==
      # 'success'); if the action step itself failed, the job is already red.
      # Falls back to the well-known temp path when the action doesn't expose
      # the execution_file output on the pinned version.
      - name: Fail the check if the review did not complete
        if: steps.claude-review.outcome == 'success'
        shell: bash
        env:
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          set -euo pipefail
          if [[ -z "$EXECUTION_FILE" ]]; then
            EXECUTION_FILE="${RUNNER_TEMP:-/home/runner/work/_temp}/claude-execution-output.json"
            echo "::warning::execution_file output not set; falling back to $EXECUTION_FILE"
          fi
          if [[ ! -f "$EXECUTION_FILE" ]]; then
            echo "::error::Claude review produced no execution output — treating as a failed review."
            exit 1
          fi
          # Handles NDJSON stream or a single JSON array; grabs the last result object.
          result="$(jq -s 'flatten | map(select(.type=="result")) | last // empty' "$EXECUTION_FILE")"
          if [[ -z "$result" || "$result" == "null" ]]; then
            echo "::error::No result object in execution output — review did not finish."
            exit 1
          fi
          is_error="$(jq -r '.is_error // false' <<< "$result")"
          subtype="$(jq -r '.subtype // ""' <<< "$result")"
          if [[ "$is_error" == "true" || "$subtype" == error_* ]]; then
            echo "::error::Claude review ended in an error state (is_error=$is_error, subtype=$subtype)."
            jq '{subtype, is_error, num_turns, duration_ms, permission_denials_count}' <<< "$result" || true
            exit 1
          fi
          echo "Claude review completed cleanly (subtype=$subtype)."

      # In agent mode (workflow_dispatch), display_report writes Claude's output
      # to the GitHub Actions step summary — not to the PR. Tag mode
      # (pull_request) creates a tracking comment automatically; agent mode does
      # not. Post the review manually here so dispatched reviews are visible on
      # the PR instead of silently discarded. Closes #87.
      - name: Post review comment for dispatched run
        if: |
          steps.claude-review.outcome == 'success' &&
          github.event_name == 'workflow_dispatch' &&
          inputs.pr-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [[ -z "$EXECUTION_FILE" || ! -f "$EXECUTION_FILE" ]]; then
            EXECUTION_FILE="${RUNNER_TEMP:-/home/runner/work/_temp}/claude-execution-output.json"
          fi
          # Extract the last assistant text block — Claude's final review output.
          REVIEW=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // ""' "$EXECUTION_FILE" 2>/dev/null || true)
          if [[ -z "$REVIEW" ]]; then
            echo "No review text found in execution output; skipping comment."
            exit 0
          fi
          # Include the run URL so the collapse step can match this comment by
          # run ID (same regex: `actions/runs/<id>` in the body).
          BODY="**Claude finished review** — [View run]($RUN_URL)

---

$REVIEW"
          gh issue comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"

      # With sticky disabled, every run leaves its own review comment. Collapse
      # the older ones (minimize as OUTDATED) so the PR shows one expanded,
      # current review with history folded beneath it. Only THIS workflow's
      # review comments are touched — identified by the run each comment links
      # to (its workflow `path` is this file) — so `@claude` task comments from
      # claude.yml (same `claude[bot]` author) are left alone.
      #
      # Not gated to pull_request: a dispatched (workflow_dispatch / agent-mode)
      # review that wins the per-PR concurrency race must fold the earlier
      # pushes' review comments too, or they linger now that dispatched runs can
      # succeed (allowed_bots, above). The run_id→path match already scopes this
      # to this workflow's comments, so running it on dispatched reviews is safe.
      # The "Post review comment for dispatched run" step above ensures that
      # dispatched runs always leave a comment with an `actions/runs/<id>` link,
      # so this collapse step can match and fold it in future rounds.
      - name: Collapse previous Claude review comments
        if: steps.claude-review.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr-number }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          REVIEW_WF: ${{ github.workflow_ref }}
        run: |
          # The caller invokes this reusable workflow, so a comment "belongs"
          # to this review iff its linked run used the same workflow file the
          # current run did. Derive that file path from github.workflow_ref
          # (owner/repo/.github/workflows/<file>@ref -> <file>).
          THIS_WF=$(printf '%s' "$REVIEW_WF" | sed -E 's#^[^/]+/[^/]+/(\.github/workflows/[^@]+)@.*#\1#')
          gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[]
                  | select(.user.login == "claude[bot]")
                  | "\(.node_id)\t\(((.body | capture("actions/runs/(?<r>[0-9]+)").r)?) // "")"' \
          | while IFS=$'\t' read -r NODE_ID RUN_ID; do
              [ -z "$RUN_ID" ] && continue
              [ "$RUN_ID" = "$CURRENT_RUN_ID" ] && continue
              WF_PATH=$(gh api "repos/$REPO/actions/runs/$RUN_ID" --jq '.path' 2>/dev/null || true)
              [ "$WF_PATH" = "$THIS_WF" ] || continue
              echo "Collapsing review comment $NODE_ID (run $RUN_ID)"
              gh api graphql -f query='
                mutation($id: ID!) {
                  minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                    minimizedComment { isMinimized }
                  }
                }' -f id="$NODE_ID" || true
            done

      # When this run is canceled (e.g. cancel-in-progress fires because a newer
      # commit — or a re-dispatched review of the same PR — superseded it), tag
      # mode's tracking comment is left stuck showing an unfinished "review in
      # progress". Explain the cancellation in the
      # comment, then fold it (minimize as OUTDATED) so the PR doesn't carry a
      # perpetual in-progress review. Tag mode only runs on pull_request, so a
      # tracking comment only exists there. The tracking comment is THIS run's
      # claude[bot] comment, identified by the run it links to — the same
      # matcher the collapse step uses.
      - name: Explain and fold tracking comment when canceled
        if: cancelled() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr-number }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NOTE=$(printf '> [!WARNING]\n> **Review canceled.** This run was canceled before it finished — superseded by a newer review of the same PR (`cancel-in-progress`), e.g. a later commit or a re-dispatched review. A fresh review runs on the latest commit; see the [canceled run](%s).\n\n---\n\n' "$RUN_URL")
          # The paginated list already carries each comment's body, so capture it
          # here (base64-encoded so an embedded tab/newline can't break the
          # tab-delimited `read`) rather than making a second per-comment fetch.
          gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[]
                  | select(.user.login == "claude[bot]")
                  | "\(.node_id)\t\(.id)\t\(((.body | capture("actions/runs/(?<r>[0-9]+)").r)?) // "")\t\(.body | @base64)"' \
          | while IFS=$'\t' read -r NODE_ID COMMENT_ID RUN_ID B64_BODY; do
              [ "$RUN_ID" = "$CURRENT_RUN_ID" ] || continue
              echo "Annotating and folding canceled tracking comment $COMMENT_ID (run $RUN_ID)"
              BODY=$(printf '%s' "$B64_BODY" | base64 -d)
              gh api -X PATCH "repos/$REPO/issues/comments/$COMMENT_ID" -f body="${NOTE}${BODY}" \
                || echo "::warning::Could not update canceled tracking comment $COMMENT_ID."
              gh api graphql -f query='
                mutation($id: ID!) {
                  minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                    minimizedComment { isMinimized }
                  }
                }' -f id="$NODE_ID" || echo "::warning::Could not fold canceled tracking comment."
            done

      - name: Re-assign reviewers after Claude finishes
        if: always() && steps.stash.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr-number }}
          HEAD_BEFORE: ${{ steps.stash.outputs.head_before }}
          USERS_BEFORE: ${{ steps.stash.outputs.users }}
          TEAMS_BEFORE: ${{ steps.stash.outputs.teams }}
        run: |
          PR_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
          HEAD_AFTER=$(echo "$PR_JSON" | jq -r '.head.sha')

          if [ "$HEAD_AFTER" = "$HEAD_BEFORE" ]; then
            # No new commits — restore the original reviewer set.
            USERS=${USERS_BEFORE:-[]}
            TEAMS=${TEAMS_BEFORE:-[]}
            if [ "$USERS" = "[]" ] && [ "$TEAMS" = "[]" ]; then
              echo "No reviewers were originally requested."
              exit 0
            fi
            echo "Restoring original reviewers."
            # No `|| true`: a failed restore silently drops the reviewer, so
            # fail loudly instead of letting them vanish.
            jq -n --argjson users "$USERS" --argjson teams "$TEAMS" \
              '{reviewers: $users, team_reviewers: $teams}' \
              | gh api -X POST "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" --input -
            exit 0
          fi

          # Claude pushed commits: route the re-request to the PR's human
          # assignees (bot assignees filtered out).
          ASSIGNEES=$(echo "$PR_JSON" | jq -c '[.assignees[] | select(.type == "User") | .login]')
          if [ "$ASSIGNEES" = "[]" ]; then
            echo "PR has no human assignees; leaving reviewers cleared."
            exit 0
          fi
          jq -n --argjson users "$ASSIGNEES" '{reviewers: $users}' \
            | gh api -X POST "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" --input -
