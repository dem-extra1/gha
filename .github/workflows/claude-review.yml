# Active caller for this repo's own reusable Claude PR review workflow
# (dogfooding). Distinct filename from the reusable
# .github/workflows/claude-code-review.yml it calls.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: string

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: d-morrison/gha/.github/workflows/claude-code-review.yml@v1
    # Pass secrets explicitly (not `secrets: inherit`) for parity with
    # examples/claude-code-review.yml; inherit only works for same-owner callers.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}   # optional; empty when unset
    with:
      pr-number: ${{ inputs.pr_number }}
