# Active caller for this repo's own reusable Claude PR review workflow
# (dogfooding). Distinct filename from the reusable
# .github/workflows/claude-code-review.yml it calls.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: string

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: d-morrison/gha/.github/workflows/claude-code-review.yml@v1
    secrets: inherit
    with:
      pr-number: ${{ inputs.pr_number }}
