name: Claude Code (reusable)

# Agent-mode Claude Code workflow. Responds to "@claude" mentions in issues,
# issue comments, PR review comments, and PR reviews, and can edit files and
# open/update PRs in response. Ported from the canonical d-morrison versions
# (serocalculator / rme) and parameterized so one workflow serves R packages,
# Quarto books, and static repos.
#
# The caller stub (see examples/claude.yml) holds the `on:` triggers; this
# reusable workflow inherits the caller's event context. Requires the
# CLAUDE_CODE_OAUTH_TOKEN secret (pass via `secrets: inherit`).
#
# Because a `prompt:` is set, the action runs in AGENT mode, which does NOT
# run the built-in branch-setup / git-push / response-comment machinery that
# tag mode provides — so this workflow reproduces it with explicit pre/post
# steps:
#   - "Set up branch for issue trigger" creates claude/issue-N-<ts>.
#   - "Push branch and finalize PR for issue trigger" pushes it + opens a
#     draft PR, so an @claude mention on an *issue* yields a PR.
#   - "Post Claude's response if no code was committed" surfaces prose replies
#     (questions/reviews) that agent mode would otherwise discard.
#   - "Dispatch <review-workflow-file> on @claude review" routes review
#     requests to the dedicated reviewer instead of self-reviewing.
#   - "Skip if this comment was already handled by an active run" + the
#     "React to comments Claude absorbed via polling" post-step dedup a late
#     @claude comment that a still-running session already absorbed via the
#     prompt's polling loop, so it isn't double-handled (qwt #73/#90/#95).
#   - "Dispatch review for a late @claude review comment" rescues a review
#     request that arrived late and was absorbed/deduped (qwt #90).
#   - When Claude finishes successfully with committed code, the post-steps
#     take the draft PR out of draft so a human knows it is ready to review
#     (controlled by the mark-ready-for-review input).

on:
  workflow_call:
    inputs:
      setup-r:
        description: Install R (pandoc + setup-r) and the package's dependencies before running Claude.
        type: boolean
        default: true
      install-quarto:
        description: Install Quarto (with tinytex) so Claude can render .qmd files.
        type: boolean
        default: false
      apt-packages:
        description: >-
          Extra apt packages to install before R/Quarto setup (space- or
          newline-separated). Use for system libraries a package needs to
          compile or run (e.g. jags, libglpk-dev, poppler-utils). Empty to skip.
        type: string
        default: ''
      pip-packages:
        description: >-
          Python packages to install with pip3 --break-system-packages
          (space-separated) before Claude runs. Empty to skip.
        type: string
        default: ''
      use-renv:
        description: Restore dependencies with renv (setup-renv) instead of DESCRIPTION-based setup-r-dependencies.
        type: boolean
        default: false
      r-extra-packages:
        description: Extra packages for setup-r-dependencies (ignored when use-renv is true).
        type: string
        default: |
          any::devtools
          any::roxygen2
          any::lintr
          any::spelling
          any::rcmdcheck
          local::.
      renv-cache-version:
        description: renv cache-version passed to setup-renv; bump to invalidate the cached library.
        type: string
        default: '1'
      checkout-submodules:
        description: >-
          Check out submodules. Private submodules require the SUBMODULES_TOKEN
          secret; public submodules clone anonymously without it.
        type: boolean
        default: false
      link-skills:
        description: >-
          Expose the caller repo's top-level skills/ directory to Claude as
          project skills (symlinked to .claude/skills) so an "@claude <skill>"
          mention can invoke them by name. Off by default; turn on for repos
          (e.g. ai-config) that ship a skills/ dir meant for the bot.

          CAVEAT: on PR-triggered runs, claude-code-action's
          restoreConfigFromBase wipes .claude/ and restores it from the base
          branch before Claude starts, which deletes this runtime symlink. So
          for PR contexts this is a no-op — commit .claude/skills -> ../skills
          to the default branch instead (the restore materializes a committed
          symlink). This step still helps non-PR (issue) triggers, where no
          base restore runs.
        type: boolean
        default: false
      eager-pr:
        description: >-
          On an issue trigger, open the draft PR up front (before Claude works,
          like GitHub Copilot) instead of only at the end. Empty PRs from runs
          that produce no code are closed automatically.
        type: boolean
        default: false
      reviewer:
        description: GitHub user re-requested as reviewer when Claude pushes commits to a PR.
        type: string
        default: 'd-morrison'
      review-workflow-file:
        description: Workflow file (in the caller repo) dispatched to review Claude's commits.
        type: string
        default: 'claude-code-review.yml'
      mark-ready-for-review:
        description: >-
          When Claude finishes successfully with committed code, take its draft
          PR out of draft mode so a human knows it is ready to review. Set false
          to leave Claude's PRs as drafts.
        type: boolean
        default: true
      prompt-addendum:
        description: Repo-specific instructions appended to Claude's prompt (e.g. the pre-commit checklist).
        type: string
        default: ''
      webfetch-allowlist-url:
        description: >-
          URL of a newline-delimited hostname allowlist (e.g. the shared
          d-morrison/stats-allowlist). When set, each valid hostname is turned
          into a WebFetch(domain:<host>) grant and appended to claude-args, so
          Claude may fetch pages from those sites. A fetch failure degrades
          gracefully to no WebFetch grants. Empty to disable WebFetch.
        type: string
        default: ''
      claude-args:
        description: Args passed to claude-code-action (allowed/disallowed tools, etc.).
        type: string
        # The agent is deliberately NOT granted `git push` in any form — the
        # post-steps do all pushing, so the agent only stages and commits.
        # That sidesteps the whole class of destructive push variants rather
        # than enumerating deny patterns; the denials below are defense-in-
        # depth in case a push tool is ever re-added to the allow list.
        # `gh pr create` is likewise omitted: PR creation is owned by the
        # post-steps (and the agent has no push), so granting it would only
        # invite duplicate or malformed PRs. `gh pr edit` stays — it needs no
        # push and lets the agent tidy a PR's title/body.
        # `gh api` is allowed for the read-only polling loop, but its write
        # forms (`-X`/`--method` mutations and `graphql`) are denied so a
        # write-scoped GITHUB_TOKEN can't be used for arbitrary API mutations;
        # the trusted-author gate remains the primary containment.
        default: >-
          --allowedTools
          "Bash(Rscript -e 'lintr::lint*'),Bash(Rscript -e 'devtools::check*'),Bash(Rscript -e 'devtools::document*'),Bash(Rscript -e 'devtools::test*'),Bash(Rscript -e 'spelling::spell_check*'),Bash(Rscript -e 'roxygen2::roxygenise*'),Bash(quarto render:*),Bash(git diff:*),Bash(git log:*),Bash(git status:*),Bash(git show:*),Bash(git checkout:*),Bash(git switch:*),Bash(git branch:*),Bash(git add:*),Bash(git commit:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr edit:*),Bash(gh issue view:*),Bash(gh api:*),Read,Glob,Grep,Edit,MultiEdit,Write"
          --disallowedTools
          "Bash(gh api -X:*),Bash(gh api --method:*),Bash(gh api graphql:*),Bash(git push:*),Bash(git push --force:*),Bash(git push -f:*),Bash(git push --delete:*),Bash(git push -d:*),Bash(git push --mirror:*),Bash(git push --tags:*),Bash(git push --all:*),Bash(git push origin:*),Bash(git push -u origin:*)"
      runs-on:
        description: Runner for the job.
        type: string
        default: 'ubuntu-latest'
    secrets:
      # `required: false` so callers don't hard-fail at the call gate when a
      # secret is unavailable (e.g. fork-originated events): GitHub evaluates
      # required secrets before this workflow's job-level `if:` can run. The
      # trusted-author `if:` already gates who can trigger a run.
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      SUBMODULES_TOKEN:
        required: false
      # PAT/App token with `contents:write` + `workflows:write`, needed only to
      # push changes under `.github/workflows/` (GITHUB_TOKEN lacks the
      # `workflows` scope). Falls back to GITHUB_TOKEN when unset. See README →
      # Permissions.
      WORKFLOW_TOKEN:
        required: false

jobs:
  claude:
    # Only trigger for trusted authors (OWNER / MEMBER / COLLABORATOR).
    # Without this, anyone who can comment on a public issue or PR could
    # trigger an LLM run with a write-scoped GITHUB_TOKEN.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))

    # Serialize @claude sessions per issue/PR so rapid mentions don't fire
    # competing runs that race to push the same branch. `cancel-in-progress:
    # false` queues a new mention behind the running session rather than
    # killing it. `|| github.run_id` is a defensive fallback so an unexpected
    # event with no issue/PR number doesn't collapse the group to `claude-`
    # and serialize every session globally.
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
      cancel-in-progress: false

    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write       # push branches / commits
      pull-requests: write  # open / edit PRs
      issues: write         # comment on issues
      id-token: write
      actions: write        # dispatch the review workflow via `gh workflow run`

    steps:
      # --- Late-comment dedup (ported from qwt #73/#90/#95) ----------------
      # A late @claude comment that an already-running session absorbed (via
      # the polling loop in the prompt) still spawned its own run, now queued
      # behind the active one by the concurrency group above. The active
      # session marks each comment it absorbs with a github-actions 🚀 reaction
      # (the "React to comments Claude absorbed" post-step below); this step
      # makes the queued run skip itself when its triggering comment already
      # carries that marker, so the comment isn't handled twice. EVERY later
      # step is gated on `steps.dedup.outputs.skip != 'true'`.
      #
      # This relies on the per-issue/PR concurrency group above
      # (cancel-in-progress: false): the queued duplicate's whole job — this
      # step included — waits behind the active run, so by the time this check
      # executes the active session has already posted the 🚀 marker.
      #
      # Only comment events can carry a reaction, so this runs for
      # issue_comment / pull_request_review_comment only; for issues:opened and
      # pull_request_review the step is skipped, its output is empty
      # (`!= 'true'`), and the run proceeds normally. The marker must be from
      # github-actions[bot] — only this repo's GITHUB_TOKEN can author that
      # reaction, so a user can't suppress a run by hand-reacting 🚀. On any API
      # error we default to NOT skipping (fail open): a wrongful skip would drop
      # the request, the exact failure these guards exist to prevent.
      #
      # The whole dedup/absorb/react chain is best-effort: if the active session
      # never emits the `<!-- claude-absorbed: ... -->` marker, no 🚀 is posted
      # and this duplicate run proceeds normally, re-handling the comment —
      # exactly the pre-dedup behavior. An accepted degradation, not a bug.
      - name: Skip if this comment was already handled by an active run
        id: dedup
        # Fail open: a shell-level error here must not fail the job (that would
        # block the run instead of degrading to the pre-dedup duplicate-run
        # behavior). The `|| echo 0` handles gh-api errors; this covers the rest.
        continue-on-error: true
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            ENDPOINT="repos/$REPO/pulls/comments/$COMMENT_ID/reactions"
          else
            ENDPOINT="repos/$REPO/issues/comments/$COMMENT_ID/reactions"
          fi
          MARKED=$(gh api "$ENDPOINT" \
            --jq '[.[] | select(.content == "rocket" and .user.login == "github-actions[bot]")] | length' \
            2>/dev/null || echo 0)
          if [ "$MARKED" != "0" ]; then
            echo "Comment $COMMENT_ID already carries the 🚀 handled-marker; skipping this duplicate run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Post a visible acknowledgment BEFORE any multi-minute setup begins, so
      # the user knows the @claude mention was received. `continue-on-error`
      # keeps a transient comment-API hiccup from failing the run. Posted by
      # github-actions[bot], so it does not re-trigger this workflow.
      - name: Acknowledge @claude mention
        if: steps.dedup.outputs.skip != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$NUM" --repo "${{ github.repository }}" \
            --body ":eyes: Picked up by [workflow run #${{ github.run_id }}]($RUN_URL). Setup runs first; Claude itself responds after that."

      - name: Checkout repository
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: false

      # Initialize submodules so Claude can read their contents. The shared
      # composite action handles the SUBMODULES_TOKEN insteadOf rewrite and the
      # anonymous fallback; see .github/actions/checkout-submodules.
      - name: Checkout submodules
        if: steps.dedup.outputs.skip != 'true' && inputs.checkout-submodules
        uses: d-morrison/gha/.github/actions/checkout-submodules@v1
        with:
          submodules-token: ${{ secrets.SUBMODULES_TOKEN }}

      # System libraries some R/Quarto packages need to compile or run (e.g.
      # jags, libglpk-dev, poppler-utils). Runs before R setup so renv/
      # setup-r-dependencies can build against them.
      - name: Install apt packages
        if: steps.dedup.outputs.skip != 'true' && inputs.apt-packages != ''
        env:
          APT_PACKAGES: ${{ inputs.apt-packages }}
        run: |
          sudo apt-get update
          # Pipe through xargs rather than unquoted word-splitting so any shell
          # metacharacters in the input are passed to apt-get as literal args
          # (which it rejects) instead of being interpreted by the shell.
          echo "$APT_PACKAGES" | xargs sudo apt-get install -y

      - name: Install pip packages
        if: steps.dedup.outputs.skip != 'true' && inputs.pip-packages != ''
        env:
          PIP_PACKAGES: ${{ inputs.pip-packages }}
        run: echo "$PIP_PACKAGES" | xargs pip3 install --break-system-packages

      - name: Set up pandoc
        if: steps.dedup.outputs.skip != 'true' && inputs.setup-r
        uses: r-lib/actions/setup-pandoc@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0

      - name: Set up R
        if: steps.dedup.outputs.skip != 'true' && inputs.setup-r
        uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0
        with:
          use-public-rspm: true

      - name: Set up Quarto
        if: steps.dedup.outputs.skip != 'true' && inputs.install-quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          tinytex: true

      # renv flavor (Quarto books / projects pinned with renv) ...
      - name: Restore renv
        if: steps.dedup.outputs.skip != 'true' && inputs.setup-r && inputs.use-renv
        uses: r-lib/actions/setup-renv@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0
        env:
          # Without GITHUB_PAT, renv can't reach the GitHub API to resolve
          # GitHub-sourced packages (e.g. ddsjoberg/gtsummary) and
          # renv::restore() aborts with "GitHub authentication credentials are
          # not available."
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        with:
          cache-version: ${{ inputs.renv-cache-version }}

      # ... vs DESCRIPTION-based flavor (R packages). Installs the package's
      # own deps (`local::.`) plus the tools Claude runs for the pre-commit
      # checklist.
      - name: Install R dependencies
        if: steps.dedup.outputs.skip != 'true' && inputs.setup-r && !inputs.use-renv
        uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0
        with:
          extra-packages: ${{ inputs.r-extra-packages }}
          needs: check

      # Record the PR's head SHA before Claude runs (PR triggers only), so the
      # post-steps can tell whether Claude pushed new commits.
      - name: Capture PR head SHA before Claude
        id: head_before
        if: steps.dedup.outputs.skip != 'true' && (github.event.pull_request.number || github.event.issue.pull_request)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          SHA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # Check out the PR's head branch for PR-context triggers. None of the
      # events this workflow listens on are `pull_request` events, so the
      # checkout above landed on the default branch — any commit Claude makes
      # would otherwise be stranded there and lost at runner cleanup.
      - name: Checkout PR branch
        id: pr_checkout
        if: steps.dedup.outputs.skip != 'true' && (github.event.pull_request.number || github.event.issue.pull_request)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          gh pr checkout "$PR_NUMBER"
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> "$GITHUB_OUTPUT"
          echo "starting_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Create a feature branch for issue triggers so Claude's commits land
      # somewhere durable (agent mode skips the action's built-in setup-branch
      # step). The finalize post-step pushes it. If an open PR for this issue
      # already exists (a prior @claude run, or an assign-then-comment double
      # trigger), adopt its branch instead of creating a second one — branches
      # are `claude/issue-<N>-<ts>`, so a `claude/issue-<N>-` prefix matches.
      - name: Set up branch for issue trigger
        id: issue_branch
        if: |
          steps.dedup.outputs.skip != 'true' &&
          (
            github.event_name == 'issues' ||
            (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          EXISTING=$(gh pr list --state open --json number,url,headRefName \
            --jq '[.[] | select(.headRefName | startswith("claude/issue-'"$ISSUE_NUMBER"'-"))][0] // empty')
          if [ -n "$EXISTING" ]; then
            PR_NUM=$(echo "$EXISTING" | jq -r '.number')
            BRANCH=$(echo "$EXISTING" | jq -r '.headRefName')
            echo "Adopting existing PR #$PR_NUM ($BRANCH) for issue #$ISSUE_NUMBER"
            gh pr checkout "$PR_NUM"
            echo "existing_pr=$(echo "$EXISTING" | jq -r '.url')" >> "$GITHUB_OUTPUT"
          else
            BRANCH="claude/issue-${ISSUE_NUMBER}-$(date -u +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            echo "Created and switched to $BRANCH"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "starting_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # eager-pr: open the draft PR BEFORE Claude runs (mirrors GitHub Copilot's
      # assign-to-PR flow) so there's an immediate PR to watch. An empty seed
      # commit gives the branch something to open a PR from; the finalize step
      # closes the PR again if Claude commits nothing. Skipped when a PR for
      # this issue already exists (adopted above) — that one is reused.
      - name: Open draft PR up front for issue trigger
        id: eager_pr
        if: |
          steps.dedup.outputs.skip != 'true' &&
          inputs.eager-pr &&
          steps.issue_branch.outputs.branch != '' &&
          steps.issue_branch.outputs.existing_pr == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_TOKEN: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.issue_branch.outputs.branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Start @claude work on #${ISSUE_NUMBER}"
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" "$BRANCH"
          PR_BODY=$(printf 'PR opened by `@claude` to address #%s.\n\nTriggered by [workflow run](%s).\n\nAddresses #%s.\n' \
            "$ISSUE_NUMBER" "$RUN_URL" "$ISSUE_NUMBER")
          PR_TITLE="${ISSUE_TITLE:-Claude response to issue #${ISSUE_NUMBER}}"
          PR_URL=$(gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH" \
            --draft \
            --title "$PR_TITLE" \
            --body "$PR_BODY")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "seed_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
            --body "Opened draft PR up front: ${PR_URL} — Claude is working on it now." \
            || echo "::warning::Could not post up-front PR link."

      # Turn a shared hostname allowlist into WebFetch(domain:<host>) grants so
      # Claude can read pages from approved sites. The hostname regex ensures a
      # typo or tampered upstream entry can only widen WebFetch coverage, not
      # inject other claude_args via quotes or shell metacharacters. A fetch
      # failure degrades to no WebFetch grants rather than failing the run.
      - name: Build WebFetch allowlist
        id: webfetch
        if: steps.dedup.outputs.skip != 'true' && inputs.webfetch-allowlist-url != ''
        env:
          ALLOWLIST_URL: ${{ inputs.webfetch-allowlist-url }}
        run: |
          : > /tmp/allowlist.txt
          curl -fsSL "$ALLOWLIST_URL" -o /tmp/allowlist.txt \
            || echo "::warning::Could not fetch $ALLOWLIST_URL; running Claude without WebFetch permissions."
          WEBFETCH=$(tr -d '\r' < /tmp/allowlist.txt \
            | grep -v '^[[:space:]]*$' \
            | grep -v '^[[:space:]]*#' \
            | sed -E 's#^[[:space:]]*https?://##' \
            | sed -E 's#/.*$##' \
            | sed -E 's#[^A-Za-z0-9.-]+$##' \
            | tr '[:upper:]' '[:lower:]' \
            | grep -E '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)*$' \
            | sort -u \
            | sed 's#.*#WebFetch(domain:&)#' \
            | paste -sd, -)
          if [ -n "$WEBFETCH" ]; then
            echo "args=--allowedTools \"$WEBFETCH\"" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      # Expose the caller repo's skills to Claude as *project* skills so an
      # "@claude <skill>" mention can invoke them by name. claude-code-action
      # doesn't load ~/.claude skills (the runner's home is fresh), so create
      # .claude/skills -> ../skills here, after the final branch checkout and
      # right before Claude runs. No-op unless the caller opts in and ships
      # skills/.
      #
      # CAVEAT (PR triggers): claude-code-action's restoreConfigFromBase wipes
      # .claude/ and restores it from the base branch *after* this step, so on
      # PRs this symlink is deleted before Claude starts — i.e. this is a no-op
      # for PR contexts. To cover PRs, commit .claude/skills -> ../skills to the
      # default branch: the base-restore then materializes the committed symlink
      # (a `git checkout` of the base tree). This step still helps issue
      # triggers, where no base restore runs.
      - name: Link repo skills into .claude/skills
        if: steps.dedup.outputs.skip != 'true' && inputs.link-skills
        run: |
          if [ -d skills ]; then
            mkdir -p .claude
            # rm -f (not -rf): clears a stale symlink/file but refuses to nuke a
            # real committed .claude/skills directory — that errors visibly here
            # rather than silently destroying it.
            rm -f .claude/skills
            ln -s ../skills .claude/skills
            echo "Linked .claude/skills -> ../skills ($(ls -1 skills | wc -l | tr -d ' ') skills)."
          else
            echo "::warning::link-skills is true but no top-level skills/ directory was found."
          fi

      - name: Run Claude Code
        id: claude
        if: steps.dedup.outputs.skip != 'true'
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1.0.153
        # GH_TOKEN authenticates the `gh` commands granted in claude-args
        # (gh pr view/diff/edit, gh issue view, gh api); without it `gh`
        # prompts and fails in CI.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Let Claude read CI results (check runs / job logs) on PRs.
          additional_permissions: |
            actions: read
          # Append the WebFetch grants (empty when webfetch-allowlist-url is
          # unset). Multiple --allowedTools flags accumulate in the CLI.
          claude_args: ${{ inputs.claude-args }} ${{ steps.webfetch.outputs.args }}

          # Setting `prompt:` puts the action in AGENT mode (see header). The
          # triggering comment/issue body is already supplied by the action's
          # default prompt; this adds the workflow's own operating instructions.
          prompt: |
            You were triggered by an @claude mention in a
            ${{ github.event_name }} event. Address the request in the
            triggering comment / issue / review.

            **Before declaring the task complete, check for additional @claude
            requests that arrived after the triggering event:**

            1. Fetch the latest activity. Always check the issue/PR
               conversation; on a PR also check review comments and reviews
               (a follow-up `@claude` can land in any of them):
               - `gh api 'repos/${{ github.repository }}/issues/${{ github.event.issue.number || github.event.pull_request.number }}/comments' --paginate`
               - PRs only: `gh api 'repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number || github.event.issue.number }}/comments' --paginate`
               - PRs only: `gh api 'repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number || github.event.issue.number }}/reviews' --paginate`
            2. Identify entries where ALL of: `created_at` (reviews use
               `submitted_at`) is strictly later than the triggering event;
               `body` contains `@claude`; and `user.login` is neither
               `claude[bot]` nor `github-actions[bot]`.
            3. Address each match in this same session (chronological order),
               then repeat from step 1. Stop when none remain.
            4. Every late comment you addressed in step 3 also queued its OWN
               run of this workflow (one fires per @claude comment). To stop
               those duplicate runs from re-handling what you just did, **end
               your final message with a one-line marker listing the numeric
               `id`s of the comments you absorbed by polling** (the `id` field
               from step 1's response — NOT the comment that triggered you):

               <!-- claude-absorbed: 123456 789012 -->

               Space-separate the ids; emit the marker only if you absorbed at
               least one. A post-step reacts 🚀 to each id with GITHUB_TOKEN
               (which can reliably write the reaction), and the dedup pre-step
               in each duplicate run then sees the 🚀 and skips itself. Do NOT
               try to add the reaction yourself — just emit the marker; the
               post-step is what makes it reliable. (Review submissions have no
               reactions endpoint, so a late review submission can't be marked
               and its run simply proceeds.)

            Git & PR handling (a workflow step does the pushing/PR-opening,
            not you):
            - **Issue triggers**: a `claude/issue-N-<timestamp>` branch has
              already been created and checked out for you. Make your edits and
              `git commit` them. Do NOT create another branch and do NOT run
              `gh pr create` — a post-step pushes the branch and opens (or, if a
              draft PR is already open, updates) the PR linking back to the issue.
            - **PR triggers**: the PR's head branch is already checked out for
              you. Make your edits and `git commit` them. Do NOT push — a
              post-step pushes your commits when the head SHA moves.

            If your reply is **prose** (answering a question, a recommendation,
            a review) rather than a code change, write your final message as
            the reply you want posted on the thread — a post-step posts it as a
            comment when you didn't commit code.

            For an explicit `@claude review` request, do NOT post your own
            review; a post-step dispatches the dedicated code-review workflow
            instead.
            ${{ inputs.prompt-addendum }}

      # Push the commits Claude made on the PR branch (the agent isn't granted
      # `git push`). A same-repo non-fast-forward failure would silently DROP
      # commits, so let it fail loudly; a fork's branch lives elsewhere (this
      # token can't push there), which is an expected warning.
      - name: Push PR branch if Claude committed
        if: always() && steps.dedup.outputs.skip != 'true' && steps.pr_checkout.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_TOKEN: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.pr_checkout.outputs.branch }}
          STARTING_SHA: ${{ steps.pr_checkout.outputs.starting_sha }}
        run: |
          # claude-code-action's restoreConfigFromBase resets the agent's own
          # config files to the base branch before the run, so a PR can't
          # rewrite the reviewing agent's instructions. On a PR that
          # legitimately edits one of those files, that reset is a residual
          # working-tree change; the auto-commit below would commit it and
          # silently revert the PR's own config edits (#39). Force those paths
          # back to their PR-tip (HEAD) state first so the sweep never commits a
          # change to a config file the action itself reset.
          #
          # The list mirrors the action's SENSITIVE_PATHS (root-only, path-
          # literal) from src/github/operations/restore-config.ts on the @v1
          # line (read 2026-06). This copy can't detect upstream drift, so
          # re-check it against that file when bumping claude-code-action.
          #
          # `git checkout HEAD -- "$cfg"` restores paths tracked in HEAD; for a
          # path absent from HEAD but left on disk — a PR that DELETED a config
          # file, which restoreConfigFromBase re-adds untracked — checkout can't
          # match it, so fall back to `rm -rf` to honor the deletion. `rm -rf`
          # covers files and dirs (.claude, .husky) and no-ops when the path is
          # already gone. Net effect: every listed path ends matching HEAD, so
          # the sweep is intentionally lossy for *uncommitted* config changes
          # (edits, creations, or the reset) — the prompt tells Claude to commit
          # its config edits, so only residual scratch work is lost.
          for cfg in .claude .mcp.json .claude.json .gitmodules .ripgreprc CLAUDE.md CLAUDE.local.md .husky; do
            git checkout HEAD -- "$cfg" 2>/dev/null || rm -rf "$cfg" 2>/dev/null || true
          done
          # Sweep changes Claude staged or left untracked but never committed so
          # they aren't dropped (uncommitted edits never advance HEAD, and the
          # push below only fires when HEAD moved). HEAD is the PR's checked-out
          # head branch here. (The issue-trigger finalize step sweeps the same
          # way but does NOT revert config first: no base-restore runs there.)
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "claude[bot]"
            git config user.email "claude[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-commit residual @claude session changes" \
              || { echo "::error::auto-commit of residual @claude changes failed"; exit 1; }
          fi
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$CURRENT_SHA" = "$STARTING_SHA" ]; then
            echo "No new commits on the PR branch; nothing to push."
            exit 0
          fi
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          HEAD_REPO=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.repo.full_name')
          if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
            echo "::warning::PR #$PR_NUMBER is from fork '$HEAD_REPO'; cannot push Claude's commits there."
            exit 0
          fi
          echo "Pushing PR branch commits ($STARTING_SHA -> $CURRENT_SHA) to $BRANCH"
          # Explicit token URL: after `gh pr checkout` the persisted checkout
          # credential isn't reliably applied, so `git push origin` falls back
          # to unsupported password auth. The x-access-token URL always works.
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:$BRANCH"

      - name: Capture PR head SHA after Claude
        id: head_after
        if: always() && steps.dedup.outputs.skip != 'true' && (github.event.pull_request.number || github.event.issue.pull_request)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          SHA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # Mark the comments Claude absorbed via polling with a 🚀 reaction so the
      # duplicate run each of them queued skips itself (the dedup pre-step looks
      # for this reaction). Claude emits the absorbed ids in a
      # `<!-- claude-absorbed: id ... -->` marker; we react here with
      # GITHUB_TOKEN, which — unlike Claude's sandboxed `gh` calls — can reliably
      # POST the reaction. Fail-open: if the marker is absent or a reaction
      # fails, the duplicate run simply proceeds (never a drop). (qwt #95)
      - name: React to comments Claude absorbed via polling
        if: |
          always() &&
          steps.dedup.outputs.skip != 'true' &&
          steps.claude.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          FILE="${EXECUTION_FILE:-/home/runner/work/_temp/claude-execution-output.json}"
          [ -f "$FILE" ] || { echo "No execution file; nothing to mark."; exit 0; }
          TEXT=$(jq -rs '
            flatten(1)
            | [.[] | select(type == "object" and .type == "assistant")] | last
            | (.message.content // []) | map(select(.type == "text") | .text) | join("\n")
          ' < "$FILE" || true)
          # Pull ids out of the `<!-- claude-absorbed: ... -->` marker. The
          # `|| true` keeps the default `-e` from aborting the step when no
          # marker is present (a failing grep in an assignment would exit).
          IDS=$(printf '%s' "$TEXT" | grep -oE '<!-- *claude-absorbed:[0-9 ]*-->' | grep -oE '[0-9]+' | sort -u || true)
          [ -z "$IDS" ] && { echo "No claude-absorbed marker; nothing to mark."; exit 0; }
          for id in $IDS; do
            # A comment id is either an issue comment or a PR review comment; try
            # the issue endpoint first, fall back to the pulls endpoint.
            if gh api -X POST "repos/$REPO/issues/comments/$id/reactions" -f content=rocket >/dev/null 2>&1; then
              echo "reacted 🚀 to issue comment $id"
            elif gh api -X POST "repos/$REPO/pulls/comments/$id/reactions" -f content=rocket >/dev/null 2>&1; then
              echo "reacted 🚀 to PR review comment $id"
            else
              echo "::warning::could not react to comment $id (deleted, or not a comment id)"
            fi
          done

      # Surface Claude's final prose reply when it didn't commit code (agent
      # mode discards it otherwise). Skipped on `@claude review` with PR
      # context, since the dispatch step below routes that to the reviewer.
      - name: Post Claude's response if no code was committed
        if: |
          always() &&
          steps.dedup.outputs.skip != 'true' &&
          steps.claude.outcome == 'success' &&
          !(
            (
              contains(github.event.comment.body, '@claude review') ||
              contains(github.event.review.body, '@claude review')
            ) &&
            (github.event.pull_request.number || github.event.issue.pull_request)
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENTITY_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          ISSUE_BRANCH: ${{ steps.issue_branch.outputs.branch }}
          # Baseline for issue triggers: the eager-pr seed commit if we opened a
          # PR up front, else the branch's starting point.
          ISSUE_BASELINE_SHA: ${{ steps.eager_pr.outputs.seed_sha || steps.issue_branch.outputs.starting_sha }}
          PR_HEAD_BEFORE: ${{ steps.head_before.outputs.sha }}
          PR_HEAD_AFTER: ${{ steps.head_after.outputs.sha }}
        run: |
          # Did Claude commit anything? Issue triggers: $BRANCH tip vs the
          # baseline (seed commit or branch start) — measure the branch, not
          # HEAD, in case the agent detached. PR triggers: PR head SHA before
          # vs after. A non-empty "after" is required so a failed fetch isn't
          # misread as "committed" (which would wrongly suppress the post).
          COMMITTED=false
          if [ -n "$ISSUE_BRANCH" ] && [ -n "$ISSUE_BASELINE_SHA" ]; then
            [ "$(git rev-parse "$ISSUE_BRANCH")" != "$ISSUE_BASELINE_SHA" ] && COMMITTED=true
          fi
          if [ -n "$PR_HEAD_BEFORE" ] && [ -n "$PR_HEAD_AFTER" ] && [ "$PR_HEAD_AFTER" != "$PR_HEAD_BEFORE" ]; then
            COMMITTED=true
          fi
          if [ "$COMMITTED" = "true" ]; then
            echo "Claude committed code; commits are the deliverable, skipping response-text post."
            exit 0
          fi

          FILE="${EXECUTION_FILE:-/home/runner/work/_temp/claude-execution-output.json}"
          if [ ! -f "$FILE" ]; then
            echo "::warning::No Claude execution output at $FILE; nothing to post."
            exit 0
          fi
          # Distinguish an upstream schema change (the action renaming the
          # assistant event type) from a genuinely empty session: surface the
          # former distinctly instead of silently posting nothing.
          ASSISTANT_COUNT=$(jq -rs 'flatten(1) | [.[] | select(type == "object" and .type == "assistant")] | length' < "$FILE")
          if [ "$ASSISTANT_COUNT" = "0" ]; then
            echo "::warning::No assistant-typed events in $FILE — the action's output schema may have changed (expected .type == \"assistant\"). Nothing to post."
            exit 0
          fi
          # execution_file is a single JSON array of event objects. flatten(1)
          # collapses the slurp wrap; the type=="object" guard skips non-objects.
          RESPONSE=$(jq -rs '
            flatten(1)
            | [.[] | select(type == "object" and .type == "assistant")]
            | last
            | (.message.content // [])
            | map(select(.type == "text") | .text)
            | join("\n\n")
          ' < "$FILE")
          if [ -z "$RESPONSE" ] || [ "$RESPONSE" = "null" ]; then
            echo "::warning::No assistant text content; nothing to post."
            exit 0
          fi

          # GitHub comment bodies cap at 65,536 bytes; truncate by bytes and
          # run through `iconv -c` to drop a trailing partial multibyte char.
          MAX_LEN=60000
          BYTE_LEN=$(printf '%s' "$RESPONSE" | wc -c)
          if [ "$BYTE_LEN" -gt "$MAX_LEN" ]; then
            RESPONSE="$(printf '%s' "$RESPONSE" | head -c "$MAX_LEN" | iconv -f UTF-8 -t UTF-8 -c)

          … (response truncated at ${MAX_LEN} bytes; full text in the [workflow run](${RUN_URL}))"
          fi

          BODY="$(printf '%s\n\n<sub>— posted by @claude post-step from [workflow run](%s)</sub>\n' "$RESPONSE" "$RUN_URL")"
          # When the trigger was an inline review comment, reply IN-THREAD to it
          # (pulls/.../comments/<id>/replies) so the conversation stays anchored
          # to the diff line; every other trigger gets a top-level comment (issue
          # and PR-conversation comments share the same endpoint). The /replies
          # endpoint needs the THREAD-ROOT id, so prefer `in_reply_to_id` (null
          # at the thread root) and fall back to `comment.id`. Fall back to a
          # top-level comment if the reply API fails (e.g. the parent was deleted).
          REPLY_TARGET_ID="${{ github.event.comment.in_reply_to_id || github.event.comment.id }}"
          if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            if jq -n --arg b "$BODY" '{body: $b}' \
                 | gh api --method POST "repos/${{ github.repository }}/pulls/$ENTITY_NUMBER/comments/$REPLY_TARGET_ID/replies" --input - >/dev/null; then
              exit 0
            fi
            echo "::warning::In-thread reply failed; falling back to a top-level comment."
          fi
          gh issue comment "$ENTITY_NUMBER" --repo "${{ github.repository }}" --body "$BODY" \
            || echo "::warning::Could not post Claude's response back to the source thread."

      # Route an explicit `@claude review` request to the dedicated reviewer
      # workflow rather than letting the agent self-review.
      - name: Dispatch code review on @claude review comment
        if: |
          always() &&
          steps.dedup.outputs.skip != 'true' &&
          (github.event.pull_request.number || github.event.issue.pull_request) &&
          (
            contains(github.event.comment.body, '@claude review') ||
            contains(github.event.review.body, '@claude review')
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_WF: ${{ inputs.review-workflow-file }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          echo "Dispatching $REVIEW_WF for PR #$PR_NUMBER (@claude review comment)."
          gh workflow run "$REVIEW_WF" -f pr_number="$PR_NUMBER" \
            || echo "::warning::Could not dispatch $REVIEW_WF; review will not auto-run."

      # If an `@claude review` arrived as a LATE comment (posted after the
      # trigger and absorbed by this session's polling), the dedup marks it so
      # its OWN run skips — losing the review dispatch that run would have done.
      # Re-scan for late `@claude review` requests and dispatch here. The review
      # workflow's per-PR concurrency dedupes any redundant dispatch, so this is
      # safe even when the trigger comment was itself a review request (the step
      # above handles that; TRIGGER_TS is strict-greater, so the trigger comment
      # isn't double-counted here). (qwt #90)
      #
      # Intentionally NOT gated on steps.claude.outcome (unlike the 🚀 react
      # step): a review dispatch is independent of the agent's run, so a late
      # `@claude review` is honored even if the agent failed/was cancelled — the
      # review just runs against the PR's current state.
      - name: Dispatch review for a late @claude review comment
        if: |
          always() &&
          steps.dedup.outputs.skip != 'true' &&
          (github.event.pull_request.number || github.event.issue.pull_request)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          TRIGGER_TS: ${{ github.event.comment.created_at || github.event.review.submitted_at || github.event.issue.created_at }}
          REVIEW_WF: ${{ inputs.review-workflow-file }}
        run: |
          # `|| late=0` keeps the default `-e` from aborting on a transient gh
          # api error, degrading to "no late review found" rather than failing.
          # Bot activity is filtered here via the API `user.type` field; the dedup
          # check and the polling prompt instead match bot *logins*
          # (github-actions[bot] / claude[bot]) — two idioms, one "ignore
          # bot-authored activity" intent.
          late=$(
            { gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate --jq '.[]' 2>/dev/null
              gh api "repos/$REPO/pulls/$PR_NUMBER/comments"  --paginate --jq '.[]' 2>/dev/null
              gh api "repos/$REPO/pulls/$PR_NUMBER/reviews"   --paginate --jq '.[]' 2>/dev/null
            } | jq -s --arg ts "$TRIGGER_TS" \
                  '[.[] | select((((.created_at // .submitted_at) // "") > $ts) and ((.body // "") | test("@claude review")) and ((.user.type // "") != "Bot"))] | length' ) || late=0
          if [ "${late:-0}" -gt 0 ]; then
            echo "Found $late late @claude review request(s) newer than $TRIGGER_TS; dispatching review."
            gh workflow run "$REVIEW_WF" -f pr_number="$PR_NUMBER" \
              || echo "::warning::Could not dispatch $REVIEW_WF for the late review request."
          else
            echo "No late @claude review requests."
          fi

      # When Claude pushed new commits to a PR, re-request the standing
      # reviewer and dispatch a fresh code review. GITHUB_TOKEN-driven pushes
      # don't fire `synchronize`, so the review wouldn't auto-trigger otherwise.
      - name: Re-request review and dispatch code review if Claude pushed commits
        if: always() && steps.dedup.outputs.skip != 'true' && (github.event.pull_request.number || github.event.issue.pull_request) && steps.head_before.outputs.sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA_BEFORE: ${{ steps.head_before.outputs.sha }}
          SHA_AFTER: ${{ steps.head_after.outputs.sha }}
          REVIEWER: ${{ inputs.reviewer }}
          REVIEW_WF: ${{ inputs.review-workflow-file }}
          MARK_READY: ${{ inputs.mark-ready-for-review }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          echo "before=$SHA_BEFORE  after=$SHA_AFTER"
          if [ -n "$SHA_AFTER" ] && [ "$SHA_AFTER" != "$SHA_BEFORE" ]; then
            echo "Claude pushed new commits; re-requesting reviewer and dispatching code review."
            if [ -n "$REVIEWER" ]; then
              gh api -X POST "repos/${{ github.repository }}/pulls/$PR_NUMBER/requested_reviewers" -f "reviewers[]=$REVIEWER" \
                || echo "::warning::Could not re-request $REVIEWER as reviewer."
            fi
            gh workflow run "$REVIEW_WF" -f pr_number="$PR_NUMBER" \
              || echo "::warning::Could not dispatch $REVIEW_WF."
            # Claude finished successfully with new commits: take the PR out of
            # draft so a human knows it's ready to review. `gh pr ready` is a
            # no-op on an already-ready PR.
            if [ "$MARK_READY" = "true" ] && [ "$CLAUDE_OUTCOME" = "success" ]; then
              gh pr ready "$PR_NUMBER" \
                || echo "::warning::Could not mark PR #$PR_NUMBER ready for review."
            fi
          else
            echo "No new commits on PR head; skipping review dispatch."
          fi

      # Pair to "Set up branch for issue trigger": push Claude's commits and, in
      # lazy mode, open the draft PR. In eager-pr mode (or when a PR was adopted
      # for this issue) the PR already exists — push the new commits and dispatch
      # a review, or close the empty up-front PR if Claude produced nothing.
      # Runs on always() so partial work is preserved even if Claude failed.
      - name: Push branch and finalize PR for issue trigger
        if: |
          always() &&
          steps.dedup.outputs.skip != 'true' &&
          steps.issue_branch.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_TOKEN: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.issue_branch.outputs.branch }}
          STARTING_SHA: ${{ steps.issue_branch.outputs.starting_sha }}
          SEED_SHA: ${{ steps.eager_pr.outputs.seed_sha }}
          EAGER_PR_URL: ${{ steps.eager_pr.outputs.pr_url }}
          EXISTING_PR_URL: ${{ steps.issue_branch.outputs.existing_pr }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REVIEW_WF: ${{ inputs.review-workflow-file }}
          MARK_READY: ${{ inputs.mark-ready-for-review }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
        run: |
          # Sweep changes Claude staged or left untracked but never committed so
          # the no-new-commits check below doesn't discard them. The agent works
          # on the checked-out $BRANCH, so committing on HEAD lands on $BRANCH in
          # the normal case (a stray detach is the pre-existing edge the $BRANCH
          # measurement below already tolerates). Unlike the PR-trigger sweep,
          # this does NOT revert restoreConfigFromBase paths first: that restore
          # only runs in PR contexts (there's no base branch on an issue
          # trigger), so config edits here are genuine and must be committed.
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "claude[bot]"
            git config user.email "claude[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-commit residual @claude session changes" \
              || { echo "::error::auto-commit of residual @claude changes failed"; exit 1; }
          fi
          # Measure the tip of $BRANCH (not HEAD): the agent has git checkout/
          # switch in its toolset, so a stray detach would make HEAD diverge
          # from the branch we actually push.
          CURRENT_SHA=$(git rev-parse "$BRANCH")
          # Baseline for "did Claude commit?": the seed commit in eager mode,
          # else the branch's starting point.
          BASELINE="${SEED_SHA:-$STARTING_SHA}"
          # A PR already exists when we opened one up front (eager) or adopted
          # an open PR for this issue.
          PR_URL="${EAGER_PR_URL:-$EXISTING_PR_URL}"

          if [ "$CURRENT_SHA" = "$BASELINE" ]; then
            echo "No new commits from Claude on $BRANCH."
            if [ -n "$EAGER_PR_URL" ]; then
              # We opened an empty draft PR up front; close it (and its branch)
              # so a prose-only / no-op run doesn't leave clutter behind.
              echo "Closing empty up-front draft PR $EAGER_PR_URL"
              gh pr close "$EAGER_PR_URL" --delete-branch \
                --comment "Closing: \`@claude\` produced no code changes for #${ISSUE_NUMBER}." \
                || echo "::warning::Could not close empty draft PR $EAGER_PR_URL."
            fi
            exit 0
          fi

          echo "Pushing $BRANCH ($BASELINE -> $CURRENT_SHA)"
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" "$BRANCH"

          if [ -z "$PR_URL" ]; then
            # Lazy mode, first run: open the draft PR now that there are commits.
            # "Addresses #N" (not "Closes #N") is deliberate: this is a draft of
            # Claude's attempt and may not fully resolve the issue, so merging it
            # should not auto-close the issue.
            PR_BODY=$(printf 'PR opened by `@claude` to address #%s.\n\nTriggered by [workflow run](%s).\n\nAddresses #%s.\n' \
              "$ISSUE_NUMBER" "$RUN_URL" "$ISSUE_NUMBER")
            PR_TITLE="${ISSUE_TITLE:-Claude response to issue #${ISSUE_NUMBER}}"
            PR_URL=$(gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH" \
              --draft \
              --title "$PR_TITLE" \
              --body "$PR_BODY")
            PR_VERB="opened draft PR"
          else
            PR_VERB="pushed new commits to draft PR"
          fi
          # Dispatch a review on the new commits (the review's own concurrency
          # group dedupes a redundant dispatch).
          gh workflow run "$REVIEW_WF" -f pr_number="${PR_URL##*/}" \
            || echo "::warning::Could not dispatch $REVIEW_WF."
          # Claude finished successfully with committed code: take the draft PR
          # out of draft so a human knows it's ready to review. Gated on Claude's
          # outcome because this step runs on always() to preserve partial work —
          # a failed/incomplete run leaves the PR as a draft. `gh pr ready` is a
          # no-op on an already-ready PR.
          # On success, drop "draft " from PR_VERB so the issue comment below
          # describes the PR's real (now-ready) state.
          if [ "$MARK_READY" = "true" ] && [ "$CLAUDE_OUTCOME" = "success" ]; then
            if gh pr ready "${PR_URL##*/}"; then
              PR_VERB="${PR_VERB/draft /}"
            else
              echo "::warning::Could not mark PR #${PR_URL##*/} ready for review."
            fi
          fi
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
            --body "Pushed Claude's commits to \`${BRANCH}\` and ${PR_VERB}: ${PR_URL}" \
            || echo "::warning::Could not post PR link as issue comment."
