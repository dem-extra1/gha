# Keep the major-version tag (e.g. v1) pointing at the tip of main, the way
# r-lib/actions maintains its sliding v2/v3 tags. Consumers pin to `@v1`, so
# every merge to main re-points that tag at the new HEAD. The major version is
# derived from the latest semver tag (vX.Y.Z), so cutting a v2.0.0 release makes
# this start sliding v2 automatically.
name: Slide major-version tag

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two slides race; the most recent push wins.
concurrency:
  group: slide-major-tag
  cancel-in-progress: true

jobs:
  slide:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Move major tag to this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Latest semver release tag (vX.Y.Z) decides which major to slide.
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            echo "::notice::No vX.Y.Z tag found; nothing to slide."
            exit 0
          fi
          MAJOR="${LATEST%%.*}"          # e.g. v1.0.1 -> v1
          echo "Sliding $MAJOR to $GITHUB_SHA (latest release: $LATEST)"

          if [ "$(git rev-parse --verify --quiet "refs/tags/$MAJOR^{commit}")" = "$GITHUB_SHA" ]; then
            echo "::notice::$MAJOR already points at $GITHUB_SHA; nothing to do."
            exit 0
          fi

          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push --force origin "refs/tags/$MAJOR"
