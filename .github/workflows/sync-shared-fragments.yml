name: Sync shared fragments (reusable)

# Vendor a set of files from an upstream repo into this repo, pinned to the
# upstream commit, and open a PR when they change. The other direction of the
# shared-content sync: when two repos want to share each other's content,
# vendoring a copy avoids a second (recursive) submodule. The caller stub
# (examples/sync-shared-fragments.yml) owns the schedule / workflow_dispatch
# triggers.

on:
  workflow_call:
    inputs:
      source-repo:
        description: >-
          Upstream repository in owner/name form (e.g. UCD-SERG/lab-manual). A
          private source repo needs a SOURCE_TOKEN secret with read access; the
          default GITHUB_TOKEN can only read the repo running the workflow.
        type: string
        required: true
      source-ref:
        description: >-
          Upstream ref to track (branch, tag, or SHA). Each file is pinned to the
          last commit on this ref that touched it; the manifest records this ref
          and those per-file commits.
        type: string
        default: main
      source-paths:
        description: >-
          Newline-separated list of file paths in the upstream repo to vendor.
          Each is written to dest-dir under its basename (the upstream directory
          structure is flattened); two paths sharing a basename are rejected.
        type: string
        required: true
      dest-dir:
        description: Directory in this repo to write the vendored copies into.
        type: string
        required: true
      manifest-path:
        description: >-
          Path to a JSON manifest recording the source repo, pinned commit, and
          file list. Empty to skip writing a manifest.
        type: string
        default: ''
      base-branch:
        description: Base branch to open the PR against.
        type: string
        default: main
      pr-branch:
        description: Head branch for the automation PR.
        type: string
        default: automated/sync-shared-fragments
    secrets:
      SOURCE_TOKEN:
        required: false
      WORKFLOW_TOKEN:
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Persist a push-capable token so open-sync-pr can push without putting
          # the token in the remote URL.
          token: ${{ secrets.WORKFLOW_TOKEN || github.token }}

      - name: Vendor upstream fragments
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.SOURCE_TOKEN || github.token }}
          SOURCE_REPO: ${{ inputs.source-repo }}
          SOURCE_REF: ${{ inputs.source-ref }}
          SOURCE_PATHS: ${{ inputs.source-paths }}
          DEST_DIR: ${{ inputs.dest-dir }}
          MANIFEST_PATH: ${{ inputs.manifest-path }}
        run: |
          set -euo pipefail
          echo "::notice::Vendoring from ${SOURCE_REPO}@${SOURCE_REF} into ${DEST_DIR}"
          mkdir -p "$DEST_DIR"

          entries='[]'
          declare -A seen_basenames
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            # Flatten to the basename under dest-dir, so guard against two source
            # paths that share one (they'd silently overwrite each other). Track
            # only names written this run -- the pre-existing vendored copies are
            # expected to be present.
            base=$(basename "$path")
            if [ -n "${seen_basenames[$base]:-}" ]; then
              echo "::error::Basename collision: ${path} and ${seen_basenames[$base]} both map to ${DEST_DIR}/${base}."
              exit 1
            fi
            seen_basenames[$base]="$path"
            # Pin each file to the last commit that touched it, not the bare
            # upstream HEAD, so the manifest changes (and a PR opens) only when a
            # vendored file actually changes -- not on every unrelated upstream
            # commit. This is what keeps the two repos' auto-PRs from ping-ponging.
            file_commit=$(gh api \
              "repos/${SOURCE_REPO}/commits?sha=${SOURCE_REF}&path=${path}&per_page=1" \
              --jq '.[0].sha // empty')
            if [ -z "$file_commit" ]; then
              echo "::error::No commit found for ${path} in ${SOURCE_REPO}@${SOURCE_REF}."
              exit 1
            fi
            dest="${DEST_DIR}/${base}"
            # Raw media type returns the file content directly (no base64).
            gh api -H "Accept: application/vnd.github.raw" \
              "repos/${SOURCE_REPO}/contents/${path}?ref=${file_commit}" > "$dest"
            # Record a content hash so a consumer drift-check can verify the
            # vendored copy wasn't hand-edited without any network access.
            sha=$(sha256sum "$dest" | cut -d' ' -f1)
            entries=$(echo "$entries" | jq \
              --arg p "$dest" --arg sp "$path" --arg c "$file_commit" --arg sha "$sha" --arg repo "$SOURCE_REPO" \
              '. + [{"path": $p, "source_path": $sp, "commit": $c, "sha256": $sha, "source_url": (env.GITHUB_SERVER_URL + "/" + $repo + "/blob/" + $c + "/" + $sp)}]')
          done <<< "$SOURCE_PATHS"

          if [ -n "$MANIFEST_PATH" ]; then
            mkdir -p "$(dirname "$MANIFEST_PATH")"
            jq -n --arg repo "$SOURCE_REPO" --arg ref "$SOURCE_REF" --argjson files "$entries" \
              '{source_repo: $repo, source_ref: $ref, files: $files}' > "$MANIFEST_PATH"
          fi

      - name: Open PR if the vendored copy changed
        uses: d-morrison/gha/open-sync-pr@v1
        with:
          branch: ${{ inputs.pr-branch }}
          base: ${{ inputs.base-branch }}
          paths: ${{ inputs.dest-dir }} ${{ inputs.manifest-path }}
          commit-message: "chore: sync vendored fragments from ${{ inputs.source-repo }}"
          pr-body: |
            Automated refresh of vendored fragments from
            [`${{ inputs.source-repo }}`](https://github.com/${{ inputs.source-repo }}).
            Each file is pinned to the last upstream commit that touched it; see
            the manifest for the exact commits.

            Don't hand-edit the vendored files -- edit them upstream and let this
            workflow refresh the copy. Generated by the `sync-shared-fragments`
            reusable workflow in [`d-morrison/gha`](https://github.com/d-morrison/gha).
          token: ${{ secrets.WORKFLOW_TOKEN || github.token }}
