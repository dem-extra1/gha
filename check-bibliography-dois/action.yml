name: Check bibliography DOIs
description: >-
  Validate that every book/article BibTeX entry has a DOI that resolves and
  whose CrossRef metadata is consistent with the entry. Scans all *.bib files
  in the caller's repository.
inputs:
  install-quarto:
    description: Install Quarto when setting up R dependencies.
    default: 'false'
  no-metadata-check:
    description: Skip CrossRef metadata comparison (only check DOI presence + URL resolves).
    default: 'false'
  exclude-keys:
    description: >-
      Space/comma-separated BibTeX keys to skip (e.g. older books without DOIs).
    default: ''
runs:
  using: composite
  steps:
    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true

    - name: Set up R dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        install-quarto: ${{ inputs.install-quarto }}
        extra-packages: |
          any::bib2df
          any::httr
          any::jsonlite
          any::stringr

    - name: Check bibliography DOIs
      shell: bash
      env:
        # BIB_EXCLUDE_KEYS is read by check-bibliography-dois.R via Sys.getenv();
        # NO_METADATA_CHECK is read by this shell step below and turned into the
        # --no-metadata-check CLI flag the R script parses from commandArgs().
        BIB_EXCLUDE_KEYS: ${{ inputs.exclude-keys }}
        NO_METADATA_CHECK: ${{ inputs.no-metadata-check }}
      run: |
        set -euo pipefail

        # Collect .bib files NUL-delimited into an array so paths containing
        # spaces survive as single arguments to Rscript.
        BIB_FILES=()
        while IFS= read -r -d '' bib; do
          BIB_FILES+=("$bib")
        done < <(find . -name "*.bib" -not -path "./.git/*" -print0)

        if [ "${#BIB_FILES[@]}" -eq 0 ]; then
          echo "No bibliography (.bib) files found; nothing to check."
          exit 0
        fi
        echo "Found ${#BIB_FILES[@]} bibliography file(s):"
        printf '  %s\n' "${BIB_FILES[@]}"

        ARGS=()
        if [ "$NO_METADATA_CHECK" = "true" ]; then ARGS+=("--no-metadata-check"); fi
        Rscript "$GITHUB_ACTION_PATH/check-bibliography-dois.R" "${ARGS[@]}" "${BIB_FILES[@]}"

    - name: Summary
      if: success()
      shell: bash
      run: echo "✓ All bibliography entries have valid DOIs"
