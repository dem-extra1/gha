name: Check non-standard characters
description: >-
  Detect curly quotes and en/em dashes in .qmd and .R files in the caller's
  repository, which can cause issues in Quarto/R projects.
inputs:
  python-version:
    description: Python version to set up.
    default: '3.x'
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Check for non-standard characters
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/check-non-standard-chars.py"
