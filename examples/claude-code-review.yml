# Copy to .github/workflows/claude-code-review.yml in your repo.
# NOTE: requires the CLAUDE_CODE_OAUTH_TOKEN repository secret. Pass it
# explicitly (below) rather than via `secrets: inherit`: GitHub only inherits
# secrets into a reusable workflow owned by the same org/user, so a cross-owner
# caller (e.g. a UCD-SERG-org repo calling this d-morrison user-owned workflow)
# inherits an empty token and the run fails env-validation. The
# workflow_dispatch path lets claude.yml re-dispatch a review after an @claude
# run pushes commits — keep the file named claude-code-review.yml (or set
# claude.yml's review-workflow-file to match).
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: string

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: d-morrison/gha/.github/workflows/claude-code-review.yml@v1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}   # optional; empty when unset
    with:
      # Wires the workflow_dispatch input through so claude.yml can re-dispatch
      # a review on Claude's commits; empty (and ignored) for pull_request runs.
      pr-number: ${{ inputs.pr_number }}
    # with:
    #   checkout-submodules: true   # SUBMODULES_TOKEN secret only for private submodules
    #   prompt-addendum: |
    #     Repo-specific review guidance (e.g. Quarto/R conventions to enforce).
